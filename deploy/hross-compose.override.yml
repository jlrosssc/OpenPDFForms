services:
  pdf-proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /opt/openpdfforms/deploy/nginx/pdf-tools.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - stirling-pdf
      - openpdfforms

  stirling-pdf:
    ports: []

  openpdfforms:
    build:
      context: /opt/openpdfforms
    restart: unless-stopped
    environment:
      OPENPDFFORMS_DATA_DIR: /data
    volumes:
      - openpdfforms-data:/data

volumes:
  openpdfforms-data:
