services:
  pdf-proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${PDF_TOOLS_BIND:-127.0.0.1:18080}:8080"
    volumes:
      - ./nginx/pdf-tools.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - stirling-pdf
      - openpdfforms

  stirling-pdf:
    image: docker.stirlingpdf.com/stirlingtools/stirling-pdf:latest-fat
    restart: unless-stopped
    environment:
      DOCKER_ENABLE_SECURITY: "false"
      INSTALL_BOOK_AND_ADVANCED_HTML_OPS: "false"
      LANGS: en_GB
    volumes:
      - stirling-training-data:/usr/share/tessdata
      - stirling-configs:/configs

  openpdfforms:
    build:
      context: ..
    restart: unless-stopped
    environment:
      OPENPDFFORMS_DATA_DIR: /data
    volumes:
      - openpdfforms-data:/data

volumes:
  stirling-training-data:
  stirling-configs:
  openpdfforms-data:
