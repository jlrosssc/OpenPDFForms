server {
    listen 8080;
    server_name _;

    client_max_body_size 6g;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_connect_timeout 60s;

    location = /forms {
        return 301 /forms/;
    }

    location /forms/ {
        proxy_pass http://openpdfforms:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /forms;
    }

    location / {
        proxy_pass http://stirling-pdf:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Force uncompressed responses so sub_filter can rewrite the HTML.
        proxy_set_header Accept-Encoding "";
        sub_filter_once on;
        sub_filter_types text/html;
        sub_filter '</body>' '<a href="/forms/" style="position:fixed;right:20px;bottom:20px;z-index:9999;background:#0b5ed7;color:#fff;padding:10px 16px;border-radius:999px;font:600 14px/1.2 -apple-system,Segoe UI,Roboto,sans-serif;text-decoration:none;box-shadow:0 2px 8px rgba(0,0,0,.25);">PDF Forms &rarr;</a></body>';
    }
}
