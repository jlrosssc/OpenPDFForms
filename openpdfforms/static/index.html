<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenPDFForms</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>OpenPDFForms</h1>
      <p>Detect, review, and export fillable PDF forms.</p>
    </div>
    <div class="actions">
      <label class="file-button">
        <input id="pdf-input" type="file" accept="application/pdf">
        Upload PDF
      </label>
      <button id="export-button" disabled>Export Fillable PDF</button>
    </div>
  </header>

  <main class="workspace">
    <aside class="sidebar">
      <div class="tool-group">
        <h2>Fields</h2>
        <button data-add="text">Text</button>
        <button data-add="checkbox">Checkbox</button>
        <button data-add="radio">Radio</button>
        <button data-add="dropdown">Dropdown</button>
        <button data-add="signature">Signature</button>
        <button data-add="date">Date</button>
      </div>
      <form id="field-form" class="inspector">
        <h2>Inspector</h2>
        <label>Name<input name="name"></label>
        <label>Label<input name="label"></label>
        <label>Type
          <select name="type">
            <option value="text">Text</option>
            <option value="checkbox">Checkbox</option>
            <option value="radio">Radio</option>
            <option value="dropdown">Dropdown</option>
            <option value="signature">Signature</option>
            <option value="date">Date</option>
          </select>
        </label>
        <div class="geometry-grid">
          <label>X<input name="x" type="number" step="0.1"></label>
          <label>Y<input name="y" type="number" step="0.1"></label>
          <label>W<input name="width" type="number" step="0.1" min="1"></label>
          <label>H<input name="height" type="number" step="0.1" min="1"></label>
        </div>
        <label>Options<textarea name="options" rows="3" placeholder="One dropdown option per line"></textarea></label>
        <label class="check"><input name="required" type="checkbox"> Required</label>
        <button id="delete-field" type="button">Delete Field</button>
      </form>
    </aside>
    <section id="pages" class="pages">
      <div class="empty">
        <h2>Upload a PDF to begin</h2>
        <p>OpenPDFForms will render the pages and place detected field candidates over the document.</p>
      </div>
    </section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
